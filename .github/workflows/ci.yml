name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            pkg-config \
            libarrow-dev \
            curl \
            ca-certificates

      - name: Install V
        uses: vlang/setup-v@v1.4
        with:
          stable: true

      - name: Install Haybarn
        run: |
          curl -fsSL https://query-farm-haybarn.github.io/install | sh
          echo "${HOME}/.haybarn/cli/latest" >> "${GITHUB_PATH}"

      - name: Toolchain versions
        run: |
          v version
          haybarn --version
          pkg-config --modversion arrow

      - name: Build IPC shim and worker
        run: make worker

      - name: Run tests
        run: make test-all
