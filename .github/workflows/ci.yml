name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            pkg-config \
            curl \
            ca-certificates \
            lsb-release \
            wget

      - name: Install Apache Arrow
        run: |
          # libarrow-dev is not in default Ubuntu repos; use Apache's apt source.
          # https://arrow.apache.org/install/
          arch="$(lsb_release --id --short | tr 'A-Z' 'a-z')"
          codename="$(lsb_release --codename --short)"
          deb="apache-arrow-apt-source-latest-${codename}.deb"
          wget -q "https://packages.apache.org/artifactory/arrow/${arch}/${deb}" -O "/tmp/${deb}"
          sudo apt-get install -y -V "/tmp/${deb}"
          sudo apt-get update
          sudo apt-get install -y -V libarrow-dev

      - name: Install V
        uses: vlang/setup-v@v1.4
        with:
          stable: true

      - name: Install Haybarn
        run: |
          curl -fsSL https://query-farm-haybarn.github.io/install | sh
          echo "${HOME}/.haybarn/cli/latest" >> "${GITHUB_PATH}"

      - name: Toolchain versions
        run: |
          v version
          haybarn --version
          pkg-config --modversion arrow

      - name: Build IPC shim and worker
        run: make worker

      - name: Run tests
        run: make test-all
